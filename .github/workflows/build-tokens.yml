name: Build Tokens
on:
  push:
    branches: [main]
    paths:
      - 'tokens/**'
      - 'build/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:tokens
      - uses: actions/upload-artifact@v4
        with:
          name: token-dist
          path: dist/
